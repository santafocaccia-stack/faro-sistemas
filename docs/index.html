<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faro Sistemas — Roadmap</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #21253a;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --yellow: #eab308;
      --accent: #6366f1;
      --accent2: #818cf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p  { color: var(--muted); font-size: 0.875rem; margin-top: 2px; }
    .updated  {
      margin-left: auto;
      font-size: .75rem; color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 12px; border-radius: 20px;
    }

    /* ── Barra global ── */
    .global-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.4rem;
      margin-bottom: 2.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .global-bar span { font-size: .875rem; color: var(--muted); white-space: nowrap; }
    .bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .bar-fill  { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 4px; transition: width .8s cubic-bezier(.4,0,.2,1); }
    .bar-pct   { font-size: .875rem; font-weight: 700; color: var(--green); white-space: nowrap; }

    /* ── Sección label ── */
    .section-label {
      font-size: .7rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 1.25rem;
    }

    /* ══════════════════════════════════
       ROADMAP POR FASES
    ══════════════════════════════════ */
    .roadmap { margin-bottom: 3rem; }

    .phase {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 0 2rem;
      margin-bottom: 2.5rem;
      position: relative;
    }

    /* línea vertical entre fases */
    .phase:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 140px;
      top: 100%;
      width: 2px;
      height: 2.5rem;
      background: linear-gradient(var(--border), transparent);
      transform: translateX(-50%);
    }

    /* ── Etiqueta de fase ── */
    .phase-label {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding-top: .35rem;
      padding-right: 1rem;
      border-right: 2px solid var(--border);
      gap: .4rem;
    }

    .phase-num {
      font-size: .65rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted);
    }

    .phase-name {
      font-size: .875rem; font-weight: 700;
      text-align: right; line-height: 1.3;
    }

    .phase-badge {
      font-size: .65rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      letter-spacing: .04em; white-space: nowrap;
    }
    .phase-badge.done  { background: rgba(34,197,94,.15);  color: var(--green);  }
    .phase-badge.wip   { background: rgba(234,179,8,.15);  color: var(--yellow); }
    .phase-badge.todo  { background: rgba(100,116,139,.1); color: var(--muted);  }

    /* marca en la línea */
    .phase-dot {
      position: absolute;
      left: 140px; top: .35rem;
      width: 12px; height: 12px;
      border-radius: 50%;
      transform: translateX(-50%);
      border: 2px solid var(--bg);
    }
    .phase-dot.done { background: var(--green); }
    .phase-dot.wip  { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
    .phase-dot.todo { background: var(--border); }

    /* ── Cards de módulos dentro de la fase ── */
    .phase-modules {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: .75rem;
    }

    .mod-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      transition: border-color .2s;
    }
    .mod-card:hover { border-color: var(--accent2); }
    .mod-card.done  { border-left: 3px solid var(--green); }
    .mod-card.wip   { border-left: 3px solid var(--yellow); }
    .mod-card.todo  { border-left: 3px solid var(--border); }

    .mod-header {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: .75rem;
    }
    .mod-icon   { font-size: 1.1rem; }
    .mod-name   { font-size: .875rem; font-weight: 600; }

    .mod-tasks  { display: flex; flex-direction: column; gap: .3rem; }
    .task-item  {
      font-size: .75rem; color: var(--muted);
      display: flex; align-items: flex-start; gap: .4rem; line-height: 1.4;
    }
    .task-item.done { color: var(--text); }
    .task-check { flex-shrink: 0; margin-top: 1px; }

    /* ══════════════════════════════════
       DETALLE COLAPSABLE
    ══════════════════════════════════ */
    .detail-section { margin-top: .5rem; }

    .mod-detail {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: .6rem;
      overflow: hidden;
    }
    .mod-detail-header {
      padding: .85rem 1.25rem;
      display: flex; align-items: center; gap: .75rem;
      cursor: pointer; user-select: none;
    }
    .mod-detail-header:hover { background: rgba(255,255,255,.025); }
    .mod-detail-header h3 { font-size: .875rem; font-weight: 600; flex: 1; }

    .badge {
      font-size: .65rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; letter-spacing: .04em;
    }
    .badge.done { background: rgba(34,197,94,.15);  color: var(--green);  }
    .badge.wip  { background: rgba(234,179,8,.15);  color: var(--yellow); }
    .badge.todo { background: rgba(100,116,139,.1); color: var(--muted);  }

    .mod-detail-tasks { padding: 0 1.25rem 1rem; display: none; }
    .mod-detail-tasks.open { display: block; }

    .dtask {
      font-size: .8rem; padding: .3rem 0; color: var(--muted);
      display: flex; align-items: center; gap: .5rem;
    }
    .dtask.done { color: var(--text); }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: .75rem; color: var(--muted);
    }
    footer a { color: var(--accent2); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">🏗️</div>
    <div>
      <h1>Faro Sistemas</h1>
      <p>Roadmap de desarrollo — carnicería vertical SaaS</p>
    </div>
    <div class="updated" id="updated"></div>
  </header>

  <!-- Barra global -->
  <div class="global-bar">
    <span>Progreso general</span>
    <div class="bar-track"><div class="bar-fill" id="bar" style="width:0%"></div></div>
    <span class="bar-pct" id="pct">0%</span>
  </div>

  <!-- Roadmap por fases -->
  <div class="roadmap" id="roadmap"></div>

  <!-- Detalle colapsable -->
  <div class="section-label">Detalle de tareas</div>
  <div class="detail-section" id="detail"></div>

  <footer>
    Faro Sistemas &middot; se actualiza con cada deploy &middot;
    <a href="https://github.com/santafocaccia-stack/faro-sistemas">ver código en GitHub</a>
  </footer>

</div>

<script>
const PHASES = [
  {
    num: 'Fase 1', name: 'Fundación', status: 'done',
    modules: [
      {
        name: 'Infraestructura', icon: '⚙️', status: 'done',
        tasks: [
          { label: 'Next.js 15 App Router', done: true },
          { label: 'TypeScript strict', done: true },
          { label: 'Tailwind + shadcn/ui', done: true },
          { label: 'Drizzle ORM', done: true },
          { label: 'Supabase Auth SSR', done: true },
          { label: 'Middleware de sesión', done: true },
        ]
      },
      {
        name: 'Base de datos', icon: '🗄️', status: 'done',
        tasks: [
          { label: 'Schema tenants', done: true },
          { label: 'Schema users', done: true },
          { label: 'Schema productos', done: true },
          { label: 'Schema clientes', done: true },
          { label: 'Schema ventas', done: true },
          { label: 'Schema cuenta corriente', done: true },
          { label: 'Migración aplicada', done: true },
        ]
      },
      {
        name: 'Auth', icon: '🔐', status: 'done',
        tasks: [
          { label: 'Login', done: true },
          { label: 'Signup', done: true },
          { label: 'Onboarding / crear tenant', done: true },
          { label: 'Bootstrap Consumidor Final', done: true },
          { label: 'Recuperar contraseña', done: false },
        ]
      },
    ]
  },
  {
    num: 'Fase 2', name: 'Catálogo', status: 'todo',
    modules: [
      {
        name: 'Productos', icon: '📦', status: 'todo',
        tasks: [
          { label: 'Listado con filtros', done: false },
          { label: 'Alta / edición', done: false },
          { label: 'Stock kg y unidad', done: false },
          { label: 'Precios mayorista / minorista', done: false },
        ]
      },
      {
        name: 'Clientes', icon: '👥', status: 'todo',
        tasks: [
          { label: 'Listado', done: false },
          { label: 'Alta / edición', done: false },
          { label: 'Ficha con saldo', done: false },
        ]
      },
    ]
  },
  {
    num: 'Fase 3', name: 'Ventas', status: 'todo',
    modules: [
      {
        name: 'Punto de venta', icon: '🛒', status: 'todo',
        tasks: [
          { label: 'Venta minorista (mostrador)', done: false },
          { label: 'Venta mayorista', done: false },
          { label: 'Selección de cliente', done: false },
          { label: 'Carrito de productos', done: false },
          { label: 'Cobro contado / cta. cte.', done: false },
        ]
      },
      {
        name: 'Historial', icon: '📋', status: 'todo',
        tasks: [
          { label: 'Listado de ventas', done: false },
          { label: 'Filtros por fecha y canal', done: false },
          { label: 'Detalle de venta', done: false },
        ]
      },
      {
        name: 'Cuenta Corriente', icon: '📒', status: 'todo',
        tasks: [
          { label: 'Estado de cuenta por cliente', done: false },
          { label: 'Registrar pago', done: false },
          { label: 'Libro mayor de movimientos', done: false },
        ]
      },
    ]
  },
  {
    num: 'Fase 4', name: 'Insights', status: 'todo',
    modules: [
      {
        name: 'Reportes', icon: '📊', status: 'todo',
        tasks: [
          { label: 'Ventas del día', done: false },
          { label: 'Ranking de productos', done: false },
          { label: 'Clientes con saldo deudor', done: false },
        ]
      },
      {
        name: 'Configuración', icon: '🔧', status: 'todo',
        tasks: [
          { label: 'Datos del negocio', done: false },
          { label: 'Gestión de empleados', done: false },
          { label: 'Habilitar canales de venta', done: false },
        ]
      },
    ]
  },
];

const label = { done: 'Completo', wip: 'En progreso', todo: 'Pendiente' };

// ── Roadmap por fases ──
const roadmapEl = document.getElementById('roadmap');
PHASES.forEach(phase => {
  const modulesHtml = phase.modules.map(m => {
    const tasksHtml = m.tasks.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <span class="task-check">${t.done ? '✅' : '⬜'}</span>
        <span>${t.label}</span>
      </div>`).join('');
    return `
      <div class="mod-card ${m.status}">
        <div class="mod-header">
          <span class="mod-icon">${m.icon}</span>
          <span class="mod-name">${m.name}</span>
        </div>
        <div class="mod-tasks">${tasksHtml}</div>
      </div>`;
  }).join('');

  roadmapEl.innerHTML += `
    <div class="phase">
      <div class="phase-dot ${phase.status}"></div>
      <div class="phase-label">
        <span class="phase-num">${phase.num}</span>
        <span class="phase-name">${phase.name}</span>
        <span class="phase-badge ${phase.status}">${label[phase.status]}</span>
      </div>
      <div class="phase-modules">${modulesHtml}</div>
    </div>`;
});

// ── Detalle colapsable ──
const detailEl = document.getElementById('detail');
let idx = 0;
PHASES.forEach(phase => {
  phase.modules.forEach(m => {
    const i = idx++;
    const tasksHtml = m.tasks.map(t =>
      `<div class="dtask ${t.done ? 'done' : ''}">
        <span>${t.done ? '✅' : '⬜'}</span> ${t.label}
      </div>`
    ).join('');
    detailEl.innerHTML += `
      <div class="mod-detail">
        <div class="mod-detail-header" onclick="toggle(${i})">
          <span>${m.icon}</span>
          <h3>${m.name}</h3>
          <span class="badge ${m.status}">${label[m.status]}</span>
          <span style="color:var(--muted);font-size:.8rem" id="arr-${i}">▼</span>
        </div>
        <div class="mod-detail-tasks" id="tasks-${i}">${tasksHtml}</div>
      </div>`;
  });
});

function toggle(i) {
  const el = document.getElementById('tasks-' + i);
  const ar = document.getElementById('arr-' + i);
  el.classList.toggle('open');
  ar.textContent = el.classList.contains('open') ? '▲' : '▼';
}

// ── Barra global ──
const allTasks = PHASES.flatMap(p => p.modules.flatMap(m => m.tasks));
const pct = Math.round(allTasks.filter(t => t.done).length / allTasks.length * 100);
setTimeout(() => {
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
}, 200);

// ── Fecha ──
document.getElementById('updated').textContent =
  'Actualizado: ' + new Date(document.lastModified).toLocaleDateString('es-AR');
</script>
</body>
</html>
