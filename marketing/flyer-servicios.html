<!doctype html><html lang="es"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px}
body{font-family:'Inter',sans-serif;color:#eef2f8;position:relative;overflow:hidden;
  padding:96px 90px;display:flex;flex-direction:column;justify-content:space-between;
  background:radial-gradient(ellipse 90% 70% at 50% -10%,rgba(59,130,246,.32),transparent 60%),#0c0e12;}
.logo{display:flex;align-items:center;gap:16px}
.mark{width:60px;height:60px;border-radius:15px;background:linear-gradient(145deg,#ff7a1a,#e24a00);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:36px;color:#1a0f06;
  box-shadow:0 0 0 1px rgba(255,255,255,.1) inset,0 12px 36px rgba(249,104,0,.45)}
.brand{font-size:40px;font-weight:800;letter-spacing:-.02em}
.mid h1{font-size:104px;line-height:.98;font-weight:900;letter-spacing:-.04em}
.mid h1 .b{color:#3b82f6}
.mid p{font-size:38px;color:#aeb6c4;font-weight:500;margin-top:34px;line-height:1.3;max-width:860px}
.foot{display:flex;align-items:center;justify-content:space-between}
.pill{background:linear-gradient(145deg,#4b92ff,#2563eb);color:#fff;font-weight:900;font-size:36px;
  padding:24px 44px;border-radius:20px;box-shadow:0 14px 40px rgba(59,130,246,.45)}
.foot .n{font-size:28px;color:#aeb6c4;font-weight:700;text-align:right}
</style></head><body>
  <div class="logo"><div class="mark">G</div><div class="brand">Gesto · Servicios</div></div>
  <div class="mid">
    <h1>Presupuestos<br>en PDF por<br><span class="b">WhatsApp.</span></h1>
    <p>Armalo en el celular y enviáselo al cliente en 30 segundos. Prolijo y profesional.</p>
  </div>
  <div class="foot">
    <div class="pill">Probalo 15 días gratis</div>
    <div class="n">Sin tarjeta<br>usegesto.app</div>
  </div>
</body></html>
